name: Publish to AUR

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pacman -Sy --noconfirm openssh git

      - name: Set up SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org >> "$HOME/.ssh/known_hosts" 2>/dev/null

      - name: Regenerate .SRCINFO and push to AUR
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
          AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
          GIT_SSH_COMMAND: ssh -i /home/builder/.ssh/aur -o UserKnownHostsFile=/home/builder/.ssh/known_hosts
        run: |
          useradd -m builder
          cp -r "$HOME/.ssh" /home/builder/.ssh
          chown -R builder:builder /home/builder/.ssh

          GIT_SSH_COMMAND="ssh -i /home/builder/.ssh/aur -o UserKnownHostsFile=/home/builder/.ssh/known_hosts" \
            su builder -c "git clone ssh://aur@aur.archlinux.org/canto-git.git /home/builder/aur-canto"

          cp PKGBUILD canto.install /home/builder/aur-canto/
          chown builder:builder /home/builder/aur-canto/PKGBUILD /home/builder/aur-canto/canto.install

          su builder -c "
            cd /home/builder/aur-canto
            makepkg --printsrcinfo > .SRCINFO
            git config user.name '$AUR_USERNAME'
            git config user.email '$AUR_EMAIL'
            git add PKGBUILD .SRCINFO canto.install
            git diff --cached --quiet || git commit -m 'Update to $GITHUB_SHA'
            GIT_SSH_COMMAND='ssh -i /home/builder/.ssh/aur -o UserKnownHostsFile=/home/builder/.ssh/known_hosts' \
              git pull --rebase origin master
            GIT_SSH_COMMAND='ssh -i /home/builder/.ssh/aur -o UserKnownHostsFile=/home/builder/.ssh/known_hosts' \
              git push origin master
          "
